databases:
  - name: hrms-db
    plan: free
    databaseName: hrms_lite
    user: hrms_user

services:
  - type: web
    name: hrms-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
